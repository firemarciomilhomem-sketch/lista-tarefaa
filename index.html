<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Lista de Compras</title>

    <style>
        body {
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .app {
            background: #ffffff;
            padding: 20px;
            width: 320px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 15px;
        }

        .input-area {
            display: flex;
            gap: 5px;
        }

        input {
            flex: 1;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 8px 12px;
            border: none;
            background: #28a745;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 15px;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f8f8;
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 5px;
        }

        li span {
            cursor: pointer;
        }

        .remover {
            background: #dc3545;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 12px;
        }

        .remover:hover {
            background: #c82333;
        }

        .comprado {
            text-decoration: line-through;
            color: gray;
        }
        img{
            
            width: 200px;
        }
    </style>
</head>
<body>

    <div class="app">
        <h1>🛒 Lista de Compras da coruja</h1>
        <img src="imagens/coruja.png" alt="">

        <div class="input-area">
            <input type="text" id="item" placeholder="Digite o produto">
            <button onclick="adicionarItem()">Adicionar</button>
        </div>

        <ul id="lista"></ul>
    </div>

    <script>
        function adicionarItem() {
            const input = document.getElementById("item");
            const texto = input.value.trim();

            if (texto === "") {
                alert("Digite um produto!");
                return;
            }

            const lista = document.getElementById("lista");

            const li = document.createElement("li");

            const span = document.createElement("span");
            span.textContent = texto;
            span.onclick = () => {
                span.classList.toggle("comprado");
            };

            const btnRemover = document.createElement("button");
            btnRemover.textContent = "X";
            btnRemover.className = "remover";
            btnRemover.onclick = () => {
                lista.removeChild(li);
            };

            li.appendChild(span);
            li.appendChild(btnRemover);

            lista.appendChild(li);

            input.value = "";
            input.focus();
        }
    </script>

</body>
</html>
